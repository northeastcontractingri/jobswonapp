<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#f59e0b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="JobsWon" />
  <meta name="description" content="JobsWon - AI Proposal Generator for Contractors. Win more jobs in 60 seconds." />
  <title>JobsWon – AI Proposals for Contractors</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23f59e0b'/><text y='.9em' font-size='80' x='10'>🏆</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body { background: #0a0b0e; font-family: 'Barlow', 'Segoe UI', sans-serif; color: #eef0f5; -webkit-font-smoothing: antialiased; }
    #root { min-height: 100vh; }
    textarea, input, select { -webkit-appearance: none; font-family: inherit; }
    textarea:focus, input:focus, select:focus { outline: none; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0a0b0e; }
    ::-webkit-scrollbar-thumb { background: #1c1f27; border-radius: 2px; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
    .fade-up { animation: fadeUp 0.4s ease forwards; }
    @media print {
      .no-print { display: none !important; }
      body { background: white; color: black; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ─── THEME ───────────────────────────────────────────────────────────────
    const C = {
      bg: '#0a0b0e',
      card: '#111318',
      card2: '#161920',
      border: '#1c1f27',
      amber: '#f59e0b',
      amberDark: '#d97706',
      text: '#eef0f5',
      muted: '#5a6070',
      green: '#22c55e',
      red: '#ef4444',
      blue: '#3b82f6',
    };

    // ─── CONFIG ──────────────────────────────────────────────────────────────
    const FREE_LIMIT = 3;

    const STRIPE = {
      solo: 'https://buy.stripe.com/REPLACE_SOLO',
      pro:  'https://buy.stripe.com/REPLACE_PRO',
      team: 'https://buy.stripe.com/REPLACE_TEAM',
    };

    const SYSTEM_PROMPT = `You are JobsWon, an expert contractor estimating AI for Northeast Contracting LLC in Rhode Island. 
Generate a professional, detailed contractor job proposal based on the job description provided.

Respond ONLY with valid JSON in this exact format:
{
  "title": "Job title (short, clear)",
  "client": "Client name if mentioned, otherwise 'Valued Client'",
  "address": "Property address if mentioned",
  "scope": ["Line item 1", "Line item 2", "Line item 3"],
  "materials": ["Material 1 with quantity", "Material 2 with quantity"],
  "timeline": "Estimated project timeline",
  "laborCost": 0000,
  "materialCost": 0000,
  "totalCost": 0000,
  "warranty": "Warranty terms",
  "notes": "Any important notes or exclusions",
  "terms": "Payment terms"
}

Be specific, professional, and use Rhode Island contractor pricing. All costs in USD numbers only (no $ signs in the numbers).`;

    // ─── STORAGE ─────────────────────────────────────────────────────────────
    const getUsage = () => parseInt(localStorage.getItem('jw_usage') || '0');
    const setUsage = (n) => localStorage.setItem('jw_usage', String(n));
    const getUnlocked = () => localStorage.getItem('jw_unlocked') === 'true';
    const setUnlocked = () => localStorage.setItem('jw_unlocked', 'true');

    // ─── API CALL ─────────────────────────────────────────────────────────────
    async function generateProposal(jobDesc) {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: SYSTEM_PROMPT,
          messages: [{ role: 'user', content: jobDesc }],
        }),
      });
      if (!res.ok) throw new Error('API error ' + res.status);
      const data = await res.json();
      const text = data.content.map(b => b.text || '').join('');
      const clean = text.replace(/```json|```/g, '').trim();
      return JSON.parse(clean);
    }

    // ─── COMPONENTS ──────────────────────────────────────────────────────────

    function Logo() {
      return (
        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
          <div style={{
            width:38, height:38, borderRadius:10,
            background: `linear-gradient(135deg, ${C.amber}, ${C.amberDark})`,
            display:'flex', alignItems:'center', justifyContent:'center',
            fontSize:20, fontWeight:900, color:'#0a0b0e',
            fontFamily:'Barlow Condensed, sans-serif', letterSpacing:-1
          }}>JW</div>
          <div>
            <div style={{ fontFamily:'Barlow Condensed', fontWeight:900, fontSize:22, letterSpacing:1, color:C.amber }}>JOBSWON</div>
            <div style={{ fontSize:10, color:C.muted, letterSpacing:2, marginTop:-3 }}>AI PROPOSALS</div>
          </div>
        </div>
      );
    }

    function Spinner() {
      return (
        <div style={{ width:24, height:24, border:`3px solid ${C.border}`, borderTopColor:C.amber, borderRadius:'50%', animation:'spin 0.8s linear infinite', display:'inline-block' }} />
      );
    }

    function Badge({ text, color = C.amber }) {
      return (
        <span style={{ background: color + '22', color, border:`1px solid ${color}44`, borderRadius:6, padding:'2px 8px', fontSize:11, fontWeight:700, letterSpacing:1 }}>
          {text}
        </span>
      );
    }

    function UsageMeter({ usage, unlocked }) {
      if (unlocked) return <Badge text="✓ PRO UNLOCKED" color={C.green} />;
      const pct = Math.min((usage / FREE_LIMIT) * 100, 100);
      return (
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          <div style={{ width:80, height:6, background:C.border, borderRadius:3, overflow:'hidden' }}>
            <div style={{ width:`${pct}%`, height:'100%', background: pct >= 100 ? C.red : C.amber, borderRadius:3, transition:'width 0.3s' }} />
          </div>
          <span style={{ fontSize:12, color:C.muted }}>{usage}/{FREE_LIMIT} free</span>
        </div>
      );
    }

    function ProposalCard({ proposal, onPrint }) {
      const fmt = (n) => '$' + Number(n).toLocaleString();
      return (
        <div className="fade-up" style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:16, overflow:'hidden', marginTop:20 }}>
          {/* Header */}
          <div style={{ background:`linear-gradient(135deg, ${C.amber}22, ${C.amberDark}11)`, borderBottom:`1px solid ${C.border}`, padding:'20px 24px' }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', flexWrap:'wrap', gap:10 }}>
              <div>
                <div style={{ fontFamily:'Barlow Condensed', fontWeight:900, fontSize:22, color:C.amber }}>{proposal.title}</div>
                {proposal.client && <div style={{ color:C.muted, fontSize:13, marginTop:2 }}>Client: <span style={{ color:C.text }}>{proposal.client}</span></div>}
                {proposal.address && <div style={{ color:C.muted, fontSize:13 }}>Address: <span style={{ color:C.text }}>{proposal.address}</span></div>}
              </div>
              <button onClick={onPrint} className="no-print" style={{
                background:'transparent', border:`1px solid ${C.border}`, color:C.muted,
                padding:'6px 14px', borderRadius:8, cursor:'pointer', fontSize:12, fontWeight:600
              }}>🖨 Print / PDF</button>
            </div>
          </div>

          <div style={{ padding:'20px 24px', display:'flex', flexDirection:'column', gap:20 }}>

            {/* Scope */}
            {proposal.scope?.length > 0 && (
              <Section title="SCOPE OF WORK">
                {proposal.scope.map((item, i) => (
                  <div key={i} style={{ display:'flex', gap:10, padding:'8px 0', borderBottom:`1px solid ${C.border}` }}>
                    <span style={{ color:C.amber, fontWeight:700, minWidth:20 }}>{i+1}.</span>
                    <span style={{ fontSize:14 }}>{item}</span>
                  </div>
                ))}
              </Section>
            )}

            {/* Materials */}
            {proposal.materials?.length > 0 && (
              <Section title="MATERIALS">
                {proposal.materials.map((item, i) => (
                  <div key={i} style={{ display:'flex', alignItems:'center', gap:8, padding:'6px 0', borderBottom:`1px solid ${C.border}` }}>
                    <span style={{ color:C.amber, fontSize:12 }}>▸</span>
                    <span style={{ fontSize:14 }}>{item}</span>
                  </div>
                ))}
              </Section>
            )}

            {/* Cost Breakdown */}
            <Section title="COST BREAKDOWN">
              <CostRow label="Labor" value={proposal.laborCost} />
              <CostRow label="Materials" value={proposal.materialCost} />
              <div style={{ borderTop:`2px solid ${C.amber}44`, marginTop:8, paddingTop:12, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                <span style={{ fontFamily:'Barlow Condensed', fontWeight:800, fontSize:18 }}>TOTAL</span>
                <span style={{ fontFamily:'Barlow Condensed', fontWeight:900, fontSize:24, color:C.amber }}>{fmt(proposal.totalCost)}</span>
              </div>
            </Section>

            {/* Details Grid */}
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
              {proposal.timeline && <DetailBox icon="📅" label="Timeline" value={proposal.timeline} />}
              {proposal.warranty && <DetailBox icon="🛡" label="Warranty" value={proposal.warranty} />}
              {proposal.terms && <DetailBox icon="💳" label="Payment" value={proposal.terms} />}
              {proposal.notes && <DetailBox icon="📋" label="Notes" value={proposal.notes} />}
            </div>

            {/* Footer */}
            <div style={{ background:C.card2, borderRadius:10, padding:'14px 18px', fontSize:12, color:C.muted, textAlign:'center' }}>
              Proposal generated by <span style={{ color:C.amber, fontWeight:700 }}>Northeast Contracting LLC</span> · Rhode Island · Powered by JobsWon AI
            </div>
          </div>
        </div>
      );
    }

    function Section({ title, children }) {
      return (
        <div>
          <div style={{ fontSize:11, fontWeight:700, letterSpacing:2, color:C.muted, marginBottom:10 }}>{title}</div>
          {children}
        </div>
      );
    }

    function CostRow({ label, value }) {
      return (
        <div style={{ display:'flex', justifyContent:'space-between', padding:'6px 0', borderBottom:`1px solid ${C.border}`, fontSize:14 }}>
          <span style={{ color:C.muted }}>{label}</span>
          <span style={{ fontWeight:600 }}>${Number(value).toLocaleString()}</span>
        </div>
      );
    }

    function DetailBox({ icon, label, value }) {
      return (
        <div style={{ background:C.card2, borderRadius:10, padding:'12px 14px' }}>
          <div style={{ fontSize:11, color:C.muted, marginBottom:4 }}>{icon} {label}</div>
          <div style={{ fontSize:13, fontWeight:600 }}>{value}</div>
        </div>
      );
    }

    function PaywallModal({ onClose }) {
      return (
        <div style={{
          position:'fixed', inset:0, background:'rgba(0,0,0,0.85)', zIndex:1000,
          display:'flex', alignItems:'center', justifyContent:'center', padding:20
        }}>
          <div className="fade-up" style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:20, padding:32, maxWidth:460, width:'100%' }}>
            <div style={{ textAlign:'center', marginBottom:24 }}>
              <div style={{ fontSize:48, marginBottom:12 }}>🏆</div>
              <div style={{ fontFamily:'Barlow Condensed', fontWeight:900, fontSize:28, color:C.amber }}>FREE LIMIT REACHED</div>
              <div style={{ color:C.muted, fontSize:14, marginTop:8 }}>You've used your {FREE_LIMIT} free proposals. Upgrade to keep winning jobs.</div>
            </div>

            {[
              { key:'solo', label:'SOLO', price:'$29/mo', desc:'Unlimited proposals, 1 user', color:C.amber },
              { key:'pro',  label:'PRO',  price:'$59/mo', desc:'Unlimited + PDF export + priority AI', color:C.green },
              { key:'team', label:'TEAM', price:'$99/mo', desc:'Up to 5 users + shared proposal history', color:C.blue },
            ].map(plan => (
              <a key={plan.key} href={STRIPE[plan.key]} target="_blank" rel="noreferrer" style={{ textDecoration:'none' }}>
                <div style={{
                  background:C.card2, border:`1px solid ${plan.color}44`, borderRadius:12,
                  padding:'16px 20px', marginBottom:10, cursor:'pointer',
                  display:'flex', justifyContent:'space-between', alignItems:'center'
                }}>
                  <div>
                    <div style={{ fontFamily:'Barlow Condensed', fontWeight:800, fontSize:18, color:plan.color }}>{plan.label}</div>
                    <div style={{ fontSize:12, color:C.muted, marginTop:2 }}>{plan.desc}</div>
                  </div>
                  <div style={{ fontFamily:'Barlow Condensed', fontWeight:900, fontSize:22, color:plan.color }}>{plan.price}</div>
                </div>
              </a>
            ))}

            <button onClick={onClose} style={{
              width:'100%', marginTop:8, background:'transparent', border:`1px solid ${C.border}`,
              color:C.muted, padding:'10px', borderRadius:10, cursor:'pointer', fontSize:13
            }}>Maybe later</button>
          </div>
        </div>
      );
    }

    // ─── MAIN APP ────────────────────────────────────────────────────────────
    function App() {
      const [screen, setScreen] = useState('home'); // home | generate | history
      const [jobDesc, setJobDesc] = useState('');
      const [loading, setLoading] = useState(false);
      const [proposal, setProposal] = useState(null);
      const [error, setError] = useState('');
      const [usage, setUsageState] = useState(getUsage);
      const [unlocked, setUnlockedState] = useState(getUnlocked);
      const [showPaywall, setShowPaywall] = useState(false);
      const [history, setHistory] = useState(() => {
        try { return JSON.parse(localStorage.getItem('jw_history') || '[]'); } catch { return []; }
      });

      const saveHistory = (p) => {
        const updated = [{ ...p, _date: new Date().toLocaleDateString() }, ...history].slice(0, 20);
        setHistory(updated);
        localStorage.setItem('jw_history', JSON.stringify(updated));
      };

      const handleGenerate = async () => {
        if (!jobDesc.trim()) { setError('Please describe the job first.'); return; }
        if (!unlocked && usage >= FREE_LIMIT) { setShowPaywall(true); return; }
        setError('');
        setLoading(true);
        setProposal(null);
        try {
          const p = await generateProposal(jobDesc);
          setProposal(p);
          saveHistory(p);
          const newUsage = usage + 1;
          setUsageState(newUsage);
          setUsage(newUsage);
        } catch (e) {
          setError('Failed to generate proposal. Check your connection and try again.');
        } finally {
          setLoading(false);
        }
      };

      const handlePrint = () => window.print();

      const btnStyle = (primary) => ({
        background: primary ? `linear-gradient(135deg, ${C.amber}, ${C.amberDark})` : 'transparent',
        color: primary ? '#0a0b0e' : C.text,
        border: primary ? 'none' : `1px solid ${C.border}`,
        borderRadius: 12, padding: '14px 24px', fontFamily: 'Barlow Condensed',
        fontWeight: 800, fontSize: 16, letterSpacing: 1, cursor: 'pointer',
        width: '100%', transition: 'opacity 0.2s',
      });

      return (
        <div style={{ maxWidth:520, margin:'0 auto', minHeight:'100vh', display:'flex', flexDirection:'column' }}>

          {/* HEADER */}
          <header className="no-print" style={{
            position:'sticky', top:0, zIndex:100,
            background: C.bg + 'ee', backdropFilter:'blur(12px)',
            borderBottom:`1px solid ${C.border}`, padding:'12px 20px',
            display:'flex', justifyContent:'space-between', alignItems:'center'
          }}>
            <Logo />
            <UsageMeter usage={usage} unlocked={unlocked} />
          </header>

          {/* BODY */}
          <main style={{ flex:1, padding:'20px 16px 40px' }}>

            {/* ── HOME SCREEN ── */}
            {screen === 'home' && (
              <div className="fade-up">
                <div style={{ textAlign:'center', padding:'32px 0 24px' }}>
                  <div style={{ fontFamily:'Barlow Condensed', fontWeight:900, fontSize:42, lineHeight:1, color:C.amber }}>WIN MORE JOBS</div>
                  <div style={{ fontFamily:'Barlow Condensed', fontWeight:700, fontSize:22, color:C.text, marginTop:4 }}>PROFESSIONAL PROPOSALS IN 60 SECONDS</div>
                  <div style={{ color:C.muted, fontSize:14, marginTop:10, lineHeight:1.6 }}>
                    Describe the job, get a complete contractor proposal ready to send. Built for Rhode Island contractors.
                  </div>
                </div>

                <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:10, margin:'20px 0' }}>
                  {[['⚡','Instant','AI-powered in seconds'], ['📋','Complete','Scope, materials & cost'], ['🏆','Professional','Ready to send']].map(([icon, t, d]) => (
                    <div key={t} style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:'14px 10px', textAlign:'center' }}>
                      <div style={{ fontSize:24 }}>{icon}</div>
                      <div style={{ fontWeight:700, fontSize:13, marginTop:6 }}>{t}</div>
                      <div style={{ color:C.muted, fontSize:11, marginTop:3 }}>{d}</div>
                    </div>
                  ))}
                </div>

                <button style={btnStyle(true)} onClick={() => setScreen('generate')}>CREATE A PROPOSAL →</button>

                {history.length > 0 && (
                  <button style={{ ...btnStyle(false), marginTop:10 }} onClick={() => setScreen('history')}>
                    VIEW PAST PROPOSALS ({history.length})
                  </button>
                )}
              </div>
            )}

            {/* ── GENERATE SCREEN ── */}
            {screen === 'generate' && (
              <div className="fade-up">
                <button onClick={() => { setScreen('home'); setProposal(null); setError(''); }} style={{
                  background:'transparent', border:'none', color:C.muted, cursor:'pointer',
                  fontSize:13, marginBottom:16, padding:0, display:'flex', alignItems:'center', gap:6
                }}>← Back</button>

                <div style={{ fontFamily:'Barlow Condensed', fontWeight:900, fontSize:26, marginBottom:6 }}>NEW PROPOSAL</div>
                <div style={{ color:C.muted, fontSize:13, marginBottom:20 }}>Describe the job — the more detail, the better the proposal.</div>

                <textarea
                  value={jobDesc}
                  onChange={e => setJobDesc(e.target.value)}
                  placeholder="Example: Replace roof on 2-story colonial in Cranston, RI. About 2,400 sq ft. Tear off existing shingles, install new GAF Timberline HDZ in Charcoal. Also need ice & water shield on eaves and new drip edge. Customer is John Smith at 45 Maple Street..."
                  style={{
                    width:'100%', minHeight:160, background:C.card, border:`1px solid ${C.border}`,
                    borderRadius:12, padding:'14px 16px', color:C.text, fontSize:14,
                    lineHeight:1.6, resize:'vertical',
                  }}
                />

                {error && (
                  <div style={{ background:`${C.red}22`, border:`1px solid ${C.red}44`, borderRadius:10, padding:'10px 14px', color:C.red, fontSize:13, marginTop:10 }}>
                    {error}
                  </div>
                )}

                <button
                  style={{ ...btnStyle(true), marginTop:16, opacity: loading ? 0.7 : 1 }}
                  onClick={handleGenerate}
                  disabled={loading}
                >
                  {loading ? (
                    <span style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:10 }}>
                      <Spinner /> GENERATING PROPOSAL...
                    </span>
                  ) : '⚡ GENERATE PROPOSAL'}
                </button>

                {!unlocked && (
                  <div style={{ textAlign:'center', color:C.muted, fontSize:12, marginTop:10 }}>
                    {usage >= FREE_LIMIT ? '🔒 Free limit reached — upgrade to continue' : `${FREE_LIMIT - usage} free proposal${FREE_LIMIT - usage !== 1 ? 's' : ''} remaining`}
                  </div>
                )}

                {proposal && <ProposalCard proposal={proposal} onPrint={handlePrint} />}
              </div>
            )}

            {/* ── HISTORY SCREEN ── */}
            {screen === 'history' && (
              <div className="fade-up">
                <button onClick={() => setScreen('home')} style={{
                  background:'transparent', border:'none', color:C.muted, cursor:'pointer',
                  fontSize:13, marginBottom:16, padding:0, display:'flex', alignItems:'center', gap:6
                }}>← Back</button>

                <div style={{ fontFamily:'Barlow Condensed', fontWeight:900, fontSize:26, marginBottom:16 }}>PAST PROPOSALS</div>

                {history.length === 0 ? (
                  <div style={{ textAlign:'center', color:C.muted, padding:'60px 0' }}>No proposals yet.</div>
                ) : history.map((p, i) => (
                  <div key={i} style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:'16px 18px', marginBottom:10, cursor:'pointer' }}
                    onClick={() => { setProposal(p); setScreen('generate'); }}>
                    <div style={{ fontWeight:700, fontSize:15 }}>{p.title}</div>
                    <div style={{ color:C.muted, fontSize:12, marginTop:4, display:'flex', gap:12 }}>
                      <span>{p.client}</span>
                      <span>${Number(p.totalCost).toLocaleString()}</span>
                      {p._date && <span>{p._date}</span>}
                    </div>
                  </div>
                ))}
              </div>
            )}

          </main>

          {showPaywall && <PaywallModal onClose={() => setShowPaywall(false)} />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
