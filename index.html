<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#f59e0b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="JobsWon" />
  <meta name="description" content="JobsWon - AI Proposal Generator for Contractors. Win more jobs in 60 seconds." />
  <title>JobsWon – AI Proposals for Contractors</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body { background: #0a0b0e; font-family: 'Barlow', 'Segoe UI', sans-serif; color: #eef0f5; -webkit-font-smoothing: antialiased; }
    #root { min-height: 100vh; }
    textarea, input, select { -webkit-appearance: none; font-family: inherit; }
    textarea:focus, input:focus, select:focus { outline: none; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0a0b0e; }
    ::-webkit-scrollbar-thumb { background: #1c1f27; border-radius: 2px; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fade-up { animation: fadeUp 0.4s ease forwards; }
    @media print { .no-print { display: none !important; } body { background: white; color: black; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;
    const C = {
      bg:'#0a0b0e', card:'#111318', card2:'#161920', border:'#1c1f27',
      amber:'#f59e0b', amberDark:'#d97706', text:'#eef0f5',
      muted:'#5a6070', green:'#22c55e', red:'#ef4444',
    };
    const FREE_LIMIT = 3;
    const SYSTEM_PROMPT = `You are JobsWon, an expert contractor estimating AI for Northeast Contracting LLC in Rhode Island. Generate a professional, detailed contractor job proposal based on the job description provided. Respond ONLY with valid JSON in this exact format: {"title":"Job title","client":"Client name","address":"Property address","scope":["item1","item2","item3"],"materials":["material1","material2"],"timeline":"timeline","laborCost":0000,"materialCost":0000,"totalCost":0000,"warranty":"warranty terms","notes":"notes","terms":"payment terms"}. Be specific and use Rhode Island contractor pricing. Numbers only for costs, no $ signs.`;
    const getKey = () => localStorage.getItem('jw_api_key') || '';
    const saveKey = (k) => localStorage.setItem('jw_api_key', k);
    const getUsage = () => parseInt(localStorage.getItem('jw_usage') || '0');
    const setUsageStore = (n) => localStorage.setItem('jw_usage', String(n));

    async function generateProposal(jobDesc, apiKey) {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01' },
        body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, system: SYSTEM_PROMPT, messages: [{ role: 'user', content: jobDesc }] }),
      });
      if (!res.ok) throw new Error('API error ' + res.status);
      const data = await res.json();
      const text = data.content.map(b => b.text || '').join('');
      return JSON.parse(text.replace(/```json|```/g, '').trim());
    }

    function Logo() {
      return (
        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
          <div style={{ width:38, height:38, borderRadius:10, background:`linear-gradient(135deg, ${C.amber}, ${C.amberDark})`, display:'flex', alignItems:'center', justifyContent:'center', fontFamily:'Barlow Condensed', fontWeight:900, fontSize:18, color:'#0a0b0e' }}>JW</div>
          <div>
            <div style={{ fontFamily:'Barlow Condensed', fontWeight:900, fontSize:22, letterSpacing:1, color:C.amber }}>JOBSWON</div>
            <div style={{ fontSize:10, color:C.muted, letterSpacing:2, marginTop:-3 }}>AI PROPOSALS</div>
          </div>
        </div>
      );
    }

    function Spinner() {
      return <div style={{ width:22, height:22, border:`3px solid ${C.border}`, borderTopColor:C.amber, borderRadius:'50%', animation:'spin 0.8s linear infinite', display:'inline-block' }} />;
    }

    function SetupScreen({ onSave }) {
      const [key, setKey] = useState('');
      const [error, setError] = useState('');
      const [testing, setTesting] = useState(false);
      const handleSave = async () => {
        const k = key.trim();
        if (!k.startsWith('sk-ant-')) { setError('Key must start with sk-ant-'); return; }
        setTesting(true); setError('');
        try {
          const res = await fetch('https://api.anthropic.com/v1/messages', {
            method:'POST',
            headers:{'Content-Type':'application/json','x-api-key':k,'anthropic-version':'2023-06-01'},
            body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:10,messages:[{role:'user',content:'hi'}]})
          });
          if (res.ok || res.status===400 || res.status===529) { saveKey(k); onSave(); }
          else { setError('Invalid API key. Please check and try again.'); }
        } catch { setError('Connection error. Check your internet.'); }
        finally { setTesting(false); }
      };
      return (
        <div style={{ maxWidth:460, margin:'0 auto', padding:'40px 20px' }}>
          <div className="fade-up" style={{ textAlign:'center', marginBottom:28 }}>
            <Logo />
            <div style={{ fontFamily:'Barlow Condensed', fontWeight:900, fontSize:30, color:C.amber, marginTop:16 }}>WELCOME TO JOBSWON</div>
            <div style={{ color:C.muted, fontSize:14, marginTop:6 }}>Enter your Anthropic API key to get started.</div>
          </div>
          <div className="fade-up" style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:16, padding:24 }}>
            <div style={{ fontSize:11, fontWeight:700, letterSpacing:2, color:C.muted, marginBottom:8 }}>YOUR API KEY</div>
            <input type="password" value={key} onChange={e=>setKey(e.target.value)} placeholder="sk-ant-api03-..." style={{ width:'100%', background:C.card2, border:`1px solid ${C.border}`, borderRadius:10, padding:'12px 14px', color:C.text, fontSize:14, marginBottom:10 }} />
            {error && <div style={{ background:`${C.red}22`, border:`1px solid ${C.red}44`, borderRadius:8, padding:'10px 14px', color:C.red, fontSize:13, marginBottom:10 }}>{error}</div>}
            <button onClick={handleSave} disabled={testing||!key.trim()} style={{ width:'100%', background:`linear-gradient(135deg,${C.amber},${C.amberDark})`, border:'none', borderRadius:12, padding:'14px', fontFamily:'Barlow Condensed', fontWeight:800, fontSize:18, letterSpacing:1, color:'#0a0b0e', cursor:testing?'wait':'pointer', opacity:(!key.trim()||testing)?0.7:1 }}>
              {testing ? <span style={{display:'flex',alignItems:'center',justifyContent:'center',gap:10}}><Spinner/>TESTING KEY...</span> : 'SAVE & GET STARTED →'}
            </button>
            <div style={{ marginTop:16, background:C.card2, borderRadius:10, padding:'12px 14px', fontSize:13, color:C.text, lineHeight:1.8 }}>
              <div style={{ fontSize:11, fontWeight:700, color:C.muted, marginBottom:6 }}>WHERE TO FIND YOUR KEY</div>
              1. Go to <span style={{color:C.amber}}>platform.claude.com</span><br/>
              2. Click <span style={{color:C.amber}}>"Get API Key"</span><br/>
              3. Copy the key starting with <span style={{color:C.amber}}>sk-ant-</span><br/>
              4. Paste it above
            </div>
          </div>
        </div>
      );
    }

    function ProposalCard({ proposal }) {
      const fmt = n => '$' + Number(n).toLocaleString();
      return (
        <div className="fade-up" style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:16, overflow:'hidden', marginTop:20 }}>
          <div style={{ background:`linear-gradient(135deg,${C.amber}22,${C.amberDark}11)`, borderBottom:`1px solid ${C.border}`, padding:'18px 22px' }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', flexWrap:'wrap', gap:10 }}>
              <div>
                <div style={{ fontFamily:'Barlow Condensed', fontWeight:900, fontSize:22, color:C.amber }}>{proposal.title}</div>
                {proposal.client && <div style={{ color:C.muted, fontSize:13, marginTop:2 }}>Client: <span style={{color:C.text}}>{proposal.client}</span></div>}
                {proposal.address && <div style={{ color:C.muted, fontSize:13 }}>Address: <span style={{color:C.text}}>{proposal.address}</span></div>}
              </div>
              <button onClick={()=>window.print()} className="no-print" style={{ background:'transparent', border:`1px solid ${C.border}`, color:C.muted, padding:'6px 14px', borderRadius:8, cursor:'pointer', fontSize:12, fontWeight:600 }}>🖨 Print/PDF</button>
            </div>
          </div>
          <div style={{ padding:'20px 22px', display:'flex', flexDirection:'column', gap:18 }}>
            {proposal.scope?.length > 0 && (
              <div>
                <div style={{ fontSize:11, fontWeight:700, letterSpacing:2, color:C.muted, marginBottom:10 }}>SCOPE OF WORK</div>
                {proposal.scope.map((item,i) => (
                  <div key={i} style={{ display:'flex', gap:10, padding:'8px 0', borderBottom:`1px solid ${C.border}` }}>
                    <span style={{ color:C.amber, fontWeight:700, minWidth:20 }}>{i+1}.</span>
                    <span style={{ fontSize:14 }}>{item}</span>
                  </div>
                ))}
              </div>
            )}
            {proposal.materials?.length > 0 && (
              <div>
                <div style={{ fontSize:11, fontWeight:700, letterSpacing:2, color:C.muted, marginBottom:10 }}>MATERIALS</div>
                {proposal.materials.map((item,i) => (
                  <div key={i} style={{ display:'flex', gap:8, padding:'6px 0', borderBottom:`1px solid ${C.border}`, fontSize:14 }}>
                    <span style={{color:C.amber}}>▸</span>{item}
                  </div>
                ))}
              </div>
            )}
            <div>
              <div style={{ fontSize:11, fontWeight:700, letterSpacing:2, color:C.muted, marginBottom:10 }}>COST BREAKDOWN</div>
              {[['Labor',proposal.laborCost],['Materials',proposal.materialCost]].map(([l,v])=>(
                <div key={l} style={{ display:'flex', justifyContent:'space-between', padding:'6px 0', borderBottom:`1px solid ${C.border}`, fontSize:14 }}>
                  <span style={{color:C.muted}}>{l}</span><span style={{fontWeight:600}}>${Number(v).toLocaleString()}</span>
                </div>
              ))}
              <div style={{ borderTop:`2px solid ${C.amber}44`, marginTop:8, paddingTop:12, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                <span style={{ fontFamily:'Barlow Condensed', fontWeight:800, fontSize:18 }}>TOTAL</span>
                <span style={{ fontFamily:'Barlow Condensed', fontWeight:900, fontSize:24, color:C.amber }}>{fmt(proposal.totalCost)}</span>
              </div>
            </div>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
              {[['📅','Timeline',proposal.timeline],['🛡','Warranty',proposal.warranty],['💳','Payment',proposal.terms],['📋','Notes',proposal.notes]].filter(([,,v])=>v).map(([icon,label,value])=>(
                <div key={label} style={{ background:C.card2, borderRadius:10, padding:'12px 14px' }}>
                  <div style={{ fontSize:11, color:C.muted, marginBottom:4 }}>{icon} {label}</div>
                  <div style={{ fontSize:13, fontWeight:600 }}>{value}</div>
                </div>
              ))}
            </div>
            <div style={{ background:C.card2, borderRadius:10, padding:'12px 16px', fontSize:12, color:C.muted, textAlign:'center' }}>
              Proposal by <span style={{color:C.amber,fontWeight:700}}>Northeast Contracting LLC</span> · Rhode Island · Powered by JobsWon AI
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [apiKey, setApiKey] = useState(getKey);
      const [screen, setScreen] = useState('home');
      const [jobDesc, setJobDesc] = useState('');
      const [loading, setLoading] = useState(false);
      const [proposal, setProposal] = useState(null);
      const [error, setError] = useState('');
      const [usage, setUsage] = useState(getUsage);
      const [history, setHistory] = useState(() => { try { return JSON.parse(localStorage.getItem('jw_history')||'[]'); } catch { return []; } });

      if (!apiKey) return <SetupScreen onSave={()=>setApiKey(getKey())} />;

      const saveHistory = (p) => {
        const updated = [{...p, _date: new Date().toLocaleDateString()}, ...history].slice(0,20);
        setHistory(updated);
        localStorage.setItem('jw_history', JSON.stringify(updated));
      };

      const handleGenerate = async () => {
        if (!jobDesc.trim()) { setError('Please describe the job first.'); return; }
        setError(''); setLoading(true); setProposal(null);
        try {
          const p = await generateProposal(jobDesc, apiKey);
          setProposal(p); saveHistory(p);
          const n = usage + 1; setUsage(n); setUsageStore(n);
        } catch { setError('Failed to generate. Check your API key and connection.'); }
        finally { setLoading(false); }
      };

      const btn = (primary) => ({
        background: primary ? `linear-gradient(135deg,${C.amber},${C.amberDark})` : 'transparent',
        color: primary ? '#0a0b0e' : C.text,
        border: primary ? 'none' : `1px solid ${C.border}`,
        borderRadius:12, padding:'14px 24px', fontFamily:'Barlow Condensed',
        fontWeight:800, fontSize:16, letterSpacing:1, cursor:'pointer', width:'100%',
      });

      return (
        <div style={{ maxWidth:520, margin:'0 auto', minHeight:'100vh', display:'flex', flexDirection:'column' }}>
          <header className="no-print" style={{ position:'sticky', top:0, zIndex:100, background:C.bg+'ee', backdropFilter:'blur(12px)', borderBottom:`1px solid ${C.border}`, padding:'12px 20px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
            <Logo />
            <div style={{ display:'flex', alignItems:'center', gap:10 }}>
              <span style={{ fontSize:12, color:C.muted }}>{usage}/{FREE_LIMIT} used</span>
              <button onClick={()=>{ if(window.confirm('Reset API key?')){ localStorage.removeItem('jw_api_key'); setApiKey(''); }}} style={{ background:'transparent', border:`1px solid ${C.border}`, color:C.muted, borderRadius:8, padding:'4px 10px', fontSize:11, cursor:'pointer' }}>⚙ Key</button>
            </div>
          </header>

          <main style={{ flex:1, padding:'20px 16px 40px' }}>
            {screen === 'home' && (
              <div className="fade-up">
                <div style={{ textAlign:'center', padding:'32px 0 24px' }}>
                  <div style={{ fontFamily:'Barlow Condensed', fontWeight:900, fontSize:42, lineHeight:1, color:C.amber }}>WIN MORE JOBS</div>
                  <div style={{ fontFamily:'Barlow Condensed', fontWeight:700, fontSize:22, color:C.text, marginTop:4 }}>PROFESSIONAL PROPOSALS IN 60 SECONDS</div>
                  <div style={{ color:C.muted, fontSize:14, marginTop:10, lineHeight:1.6 }}>Describe the job, get a complete contractor proposal ready to send.</div>
                </div>
                <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:10, margin:'20px 0' }}>
                  {[['⚡','Instant','AI-powered'],['📋','Complete','Scope & cost'],['🏆','Professional','Ready to send']].map(([icon,t,d])=>(
                    <div key={t} style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:'14px 10px', textAlign:'center' }}>
                      <div style={{ fontSize:24 }}>{icon}</div>
                      <div style={{ fontWeight:700, fontSize:13, marginTop:6 }}>{t}</div>
                      <div style={{ color:C.muted, fontSize:11, marginTop:3 }}>{d}</div>
                    </div>
                  ))}
                </div>
                <button style={btn(true)} onClick={()=>setScreen('generate')}>CREATE A PROPOSAL →</button>
                {history.length > 0 && <button style={{...btn(false), marginTop:10}} onClick={()=>setScreen('history')}>VIEW PAST PROPOSALS ({history.length})</button>}
              </div>
            )}

            {screen === 'generate' && (
              <div className="fade-up">
                <button onClick={()=>{setScreen('home');setProposal(null);setError('');}} style={{ background:'transparent', border:'none', color:C.muted, cursor:'pointer', fontSize:13, marginBottom:16, padding:0 }}>← Back</button>
                <div style={{ fontFamily:'Barlow Condensed', fontWeight:900, fontSize:26, marginBottom:6 }}>NEW PROPOSAL</div>
                <div style={{ color:C.muted, fontSize:13, marginBottom:16 }}>Describe the job — the more detail, the better.</div>
                <textarea value={jobDesc} onChange={e=>setJobDesc(e.target.value)} placeholder="Example: Replace roof on 2-story colonial in Cranston RI. About 2,400 sq ft. GAF Timberline HDZ shingles in Charcoal. Customer John Smith, 45 Maple Street..." style={{ width:'100%', minHeight:160, background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:'14px 16px', color:C.text, fontSize:14, lineHeight:1.6, resize:'vertical' }} />
                {error && <div style={{ background:`${C.red}22`, border:`1px solid ${C.red}44`, borderRadius:10, padding:'10px 14px', color:C.red, fontSize:13, marginTop:10 }}>{error}</div>}
                <button style={{...btn(true), marginTop:14, opacity:loading?0.7:1}} onClick={handleGenerate} disabled={loading}>
                  {loading ? <span style={{display:'flex',alignItems:'center',justifyContent:'center',gap:10}}><Spinner/>GENERATING...</span> : '⚡ GENERATE PROPOSAL'}
                </button>
                {proposal && <ProposalCard proposal={proposal} />}
              </div>
            )}

            {screen === 'history' && (
              <div className="fade-up">
                <button onClick={()=>setScreen('home')} style={{ background:'transparent', border:'none', color:C.muted, cursor:'pointer', fontSize:13, marginBottom:16, padding:0 }}>← Back</button>
                <div style={{ fontFamily:'Barlow Condensed', fontWeight:900, fontSize:26, marginBottom:16 }}>PAST PROPOSALS</div>
                {history.map((p,i)=>(
                  <div key={i} style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:'16px 18px', marginBottom:10, cursor:'pointer' }} onClick={()=>{setProposal(p);setScreen('generate');}}>
                    <div style={{ fontWeight:700, fontSize:15 }}>{p.title}</div>
                    <div style={{ color:C.muted, fontSize:12, marginTop:4, display:'flex', gap:12 }}>
                      <span>{p.client}</span><span>${Number(p.totalCost).toLocaleString()}</span>{p._date&&<span>{p._date}</span>}
                    </div>
                  </div>
                ))}
              </div>
            )}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
